<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>HDIX - Livreur</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <meta name="theme-color" content="#1a2b4c" />
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-container">
    <header class="admin-header">
        <div class="header-left">
            <h1>HDIX</h1>
            <span class="badge">Livreur</span>
        </div>
        <div class="header-right">
            <span id="livreurName">Livreur</span>
            <button onclick="logout()" class="btn-logout">Déconnexion</button>
        </div>
    </header>

    <div class="livreur-card">
        <div><strong>Nom :</strong> <span id="livreurNom">Chargement...</span></div>
        <div><strong>Zone :</strong> <span id="livreurZone">-</span></div>
        <div><strong>Statut :</strong> <span class="badge" id="livreurStatut">Disponible</span></div>
    </div>

    <!-- Carte géolocalisation -->
    <div id="mapContainer">
        <div id="map" class="map-placeholder">
            🗺️ Position en temps réel<br>
            <small style="color:#6b7a8f;">(Service de géolocalisation activé)</small>
        </div>
    </div>

    <h3 style="margin-top:24px;">📦 Mes commandes</h3>
    <div id="commandesContainer">
        <p class="empty-message">Aucune commande assignée.</p>
    </div>

    <div style="margin-top:24px;">
        <h4>📋 Journal</h4>
        <div id="logContainer" class="log">
            <p style="color:#6b7a8f;">En attente d'actions...</p>
        </div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script src="livreur-script.js"></script>
</body>
</html>
