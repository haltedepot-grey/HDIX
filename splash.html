<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>HDIX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        .splash-container {
            text-align: center;
            animation: fadeIn 0.6s ease;
        }
        .splash-container img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .splash-container h1 {
            font-size: 28px;
            color: #1a2b4c;
            margin-top: 16px;
            letter-spacing: 2px;
        }
        .splash-container p {
            color: #6b7a8f;
            font-size: 14px;
            margin-top: 8px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <img src="assets/splash.png" alt="HDIX" />
        <h1>HDIX</h1>
        <p>Halte-Dépôt · Gestion logistique</p>
    </div>

    <!-- Script de redirection vers index.html après 2 secondes -->
    <script>
        setTimeout(function() {
            window.location.href = 'index.html';
        }, 2000);
    </script>
</body>
</html>
