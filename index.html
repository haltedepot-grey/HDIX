<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>HDIX - Halte-Dépôt</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <meta name="theme-color" content="#1a2b4c" />
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <h1>HDIX</h1>
                <p class="subtitle">Halte-Dépôt · Gestion logistique</p>
            </div>
            
            <div class="login-form">
                <h2>🔐 Connexion</h2>
                <p class="info-text">Saisissez votre code secret à 8 caractères</p>
                
                <div class="form-group">
                    <input type="password" id="codeSecret" placeholder="Code secret" maxlength="8" autocomplete="off" />
                </div>
                
                <button onclick="login()" class="btn-primary">Se connecter</button>
                
                <p id="loginMessage" class="error-message"></p>
                
                <p style="margin-top:16px;font-size:13px;color:#6b7a8f;text-align:center;">
                    Pas de compte ? <a href="#" onclick="alert('Contactez l\'administrateur HDIX.')">Contacter l'admin</a>
                </p>
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        // Sons pour la connexion
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playSound(type) {
            try {
                if (!audioCtx) audioCtx = new AudioCtx();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'sine';
                gainNode.gain.value = 0.3;
                
                if (type === 'click') {
                    oscillator.frequency.value = 600;
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.05);
                } else if (type === 'success') {
                    oscillator.frequency.value = 880;
                    oscillator.start();
                    setTimeout(() => {
                        const osc2 = audioCtx.createOscillator();
                        const gain2 = audioCtx.createGain();
                        osc2.connect(gain2);
                        gain2.connect(audioCtx.destination);
                        osc2.frequency.value = 1100;
                        osc2.type = 'sine';
                        gain2.gain.value = 0.3;
                        osc2.start();
                        osc2.stop(audioCtx.currentTime + 0.05);
                    }, 100);
                    oscillator.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'error') {
                    oscillator.frequency.value = 300;
                    oscillator.type = 'sawtooth';
                    gainNode.gain.value = 0.2;
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.15);
                }
            } catch(e) {}
        }

        function showToast(message, type) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        async function login() {
            const code = document.getElementById('codeSecret').value.trim();
            const message = document.getElementById('loginMessage');
            
            if (!code) {
                playSound('error');
                message.textContent = '⚠️ Veuillez saisir votre code secret.';
                return;
            }
            
            try {
                const snapshot = await db.collection('users')
                    .where('code_secret', '==', code)
                    .get();
                
                if (!snapshot.empty) {
                    const user = snapshot.docs[0].data();
                    sessionStorage.setItem('user', JSON.stringify(user));
                    playSound('success');
                    
                    if (user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else if (user.role === 'livreur') {
                        window.location.href = 'livreur.html';
                    } else if (user.role === 'vendeur') {
                        window.location.href = 'vendeur.html';
                    } else {
                        message.textContent = '❌ Rôle non reconnu.';
                    }
                } else {
                    playSound('error');
                    message.textContent = '❌ Code incorrect. Veuillez réessayer.';
                }
            } catch (error) {
                console.error('Erreur:', error);
                playSound('error');
                message.textContent = '❌ Erreur de connexion.';
            }
        }

        document.getElementById('codeSecret').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });

        document.getElementById('codeSecret').addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });
    </script>
</body>
</html>
